services:
  # ── Backend pool — scale to 3 for load balancer demo ──────────────
  backend:
    build: ./backend
    environment:
      SERVICE_NAME: backend
      ROLE: app
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks: [demo-net]

  # Direct backend access for reverse-proxy comparison
  backend-direct:
    build: ./backend
    ports:
      - "3001:3000"
    environment:
      SERVICE_NAME: backend-direct
      INSTANCE_ID: "direct"
      ROLE: app
    networks: [demo-net]

  # ── Microservices (API Gateway targets) ───────────────────────────
  users-service:
    build: ./backend
    environment:
      SERVICE_NAME: users-service
      ROLE: microservice
    networks: [demo-net]

  products-service:
    build: ./backend
    environment:
      SERVICE_NAME: products-service
      ROLE: microservice
    networks: [demo-net]

  orders-service:
    build: ./backend
    environment:
      SERVICE_NAME: orders-service
      ROLE: microservice
    networks: [demo-net]

  # ── Origin server (CDN source) ────────────────────────────────────
  origin-server:
    image: nginx:1.25-alpine
    volumes:
      - ./nginx/origin/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./static-assets:/usr/share/nginx/html:ro
    networks: [demo-net]

  # ── 1. Forward Proxy (:3128) ──────────────────────────────────────
  forward-proxy:
    build: ./nginx/forward-proxy
    ports:
      - "3128:3128"
    networks: [demo-net]
    depends_on:
      - load-balancer

  # ── 2. Load Balancer (:8081) ──────────────────────────────────────
  load-balancer:
    image: nginx:1.25-alpine
    ports:
      - "8081:80"
    volumes:
      - ./nginx/load-balancer/nginx.conf:/etc/nginx/nginx.conf:ro
    networks: [demo-net]
    depends_on:
      backend:
        condition: service_healthy

  # ── 3. Reverse Proxy (:8082) ──────────────────────────────────────
  reverse-proxy:
    image: nginx:1.25-alpine
    ports:
      - "8082:80"
    volumes:
      - ./nginx/reverse-proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    networks: [demo-net]
    depends_on:
      - backend

  # ── 4. API Gateway (:8083) ────────────────────────────────────────
  api-gateway:
    image: nginx:1.25-alpine
    ports:
      - "8083:80"
    volumes:
      - ./nginx/api-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    networks: [demo-net]
    depends_on:
      - users-service
      - products-service
      - orders-service

  # ── 5. CDN Edge (:8084) ───────────────────────────────────────────
  cdn:
    image: nginx:1.25-alpine
    ports:
      - "8084:80"
    volumes:
      - ./nginx/cdn/nginx.conf:/etc/nginx/nginx.conf:ro
      - cdn-cache:/var/cache/nginx
    networks: [demo-net]
    depends_on:
      - origin-server

  # ── Demo Dashboard (:8080) ────────────────────────────────────────
  dashboard:
    image: nginx:1.25-alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/dashboard/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    networks: [demo-net]

networks:
  demo-net:
    driver: bridge

volumes:
  cdn-cache:
