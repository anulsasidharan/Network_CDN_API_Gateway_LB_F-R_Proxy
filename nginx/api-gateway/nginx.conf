worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # API Gateway — single entry point for microservices with routing, auth, rate limiting.
    # Real-world: Amazon API Gateway, Kong, Netflix Zuul, AWS AppSync.

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/m;
    limit_req_status 429;

    map $http_x_api_key $api_key_valid {
        default 0;
        "demo-key-123" 1;
        "admin-key-456" 1;
    }

    server {
        listen 80;

        add_header X-API-Gateway "nginx-api-gateway-demo" always;
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "X-API-Key, Content-Type" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        location = /gateway/status {
            default_type application/json;
            return 200 '{"component":"api-gateway","port":8083,"routes":["/api/users","/api/products","/api/orders"],"features":["routing","rate-limiting","api-key-auth","cors"]}';
        }

        location = /api/users {
            if ($api_key_valid = 0) { return 401 '{"error":"Missing or invalid X-API-Key. Use demo-key-123"}'; }
            limit_req zone=api_limit burst=5 nodelay;

            proxy_pass http://users-service:3000/api/users;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Gateway-Route "users-service";
        }

        location = /api/products {
            if ($api_key_valid = 0) { return 401 '{"error":"Missing or invalid X-API-Key. Use demo-key-123"}'; }
            limit_req zone=api_limit burst=5 nodelay;

            proxy_pass http://products-service:3000/api/products;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Gateway-Route "products-service";
        }

        location = /api/orders {
            if ($api_key_valid = 0) { return 401 '{"error":"Missing or invalid X-API-Key. Use demo-key-123"}'; }
            limit_req zone=api_limit burst=5 nodelay;

            proxy_pass http://orders-service:3000/api/orders;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Gateway-Route "orders-service";
        }
    }
}
