worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Reverse Proxy — sits in front of backend servers, handling client requests.
    # Clients only see the proxy; backend identity is hidden.
    # Real-world: Nginx in front of Node.js apps, SSL termination, caching, compression.

    server {
        listen 80;
        server_name app.demo.local;

        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "X-API-Key, Content-Type" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        # Simulated public-facing hostname
        add_header X-Reverse-Proxy "nginx-reverse-proxy-demo" always;
        add_header X-Backend-Hidden "true" always;

        location / {
            proxy_pass http://backend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;

            # Hide backend server details
            proxy_hide_header X-Powered-By;
            proxy_hide_header Server;

            # Buffering & timeouts
            proxy_buffering on;
            proxy_read_timeout 30s;
        }

        location /rp-status {
            default_type application/json;
            return 200 '{"component":"reverse-proxy","backend":"backend (scaled pool)","port":8082,"features":["ssl-termination-ready","header-rewriting","backend-concealment"]}';
        }
    }
}
