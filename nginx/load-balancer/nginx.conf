worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Load Balancer — distributes incoming traffic across multiple backend servers.
    # Real-world: Amazon ALB/ELB, YouTube front-end servers, Netflix microservices.

    # Docker embedded DNS — required for runtime resolution of scaled services
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;

        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "X-API-Key, Content-Type" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        location / {
            # Variable proxy_pass forces runtime DNS lookup → round-robin across replicas
            set $backend_upstream backend:3000;
            proxy_pass http://$backend_upstream;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Load-Balancer "nginx-lb-demo";

            proxy_next_upstream error timeout http_502 http_503;
            proxy_connect_timeout 5s;
        }

        location /lb-status {
            default_type application/json;
            return 200 '{"component":"load-balancer","algorithm":"round-robin","backends":["backend x3 (scaled)"],"port":8081}';
        }
    }
}
