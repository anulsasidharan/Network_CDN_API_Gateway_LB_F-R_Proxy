worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;

        location /assets/ {
            alias /usr/share/nginx/html/assets/;
            expires 1h;
            add_header X-Origin-Server "origin-server" always;
        }

        location /api/asset-info {
            default_type application/json;
            return 200 '{"origin":true,"message":"This response comes directly from the origin server","timestamp":"$date_gmt"}';
        }
    }
}
