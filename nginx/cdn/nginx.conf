worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # CDN Edge Server — caches static content close to users, reduces origin load.
    # Real-world: Cloudflare, Amazon CloudFront, Akamai, Netflix Open Connect.

    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=static_cache:10m
                     max_size=100m inactive=60m use_temp_path=off;

    upstream origin {
        server origin-server:80;
    }

    server {
        listen 80;

        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "X-API-Key, Content-Type" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        add_header X-CDN-Edge "nginx-cdn-demo" always;

        # Cache static assets
        location /assets/ {
            proxy_pass http://origin;
            proxy_set_header Host $host;

            proxy_cache static_cache;
            proxy_cache_valid 200 10m;
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout updating;
            proxy_cache_lock on;

            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "X-API-Key, Content-Type" always;
            add_header X-Cache-Status $upstream_cache_status always;
            add_header Cache-Control "public, max-age=600" always;
        }

        # API/data — pass through without caching
        location /api/ {
            proxy_pass http://origin;
            proxy_set_header Host $host;
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "X-API-Key, Content-Type" always;
            add_header X-Cache-Status "BYPASS" always;
        }

        location /cdn-status {
            default_type application/json;
            return 200 '{"component":"cdn-edge","port":8084,"cache_zone":"static_cache","ttl":"10m","origin":"origin-server"}';
        }

        location / {
            proxy_pass http://origin;
            proxy_set_header Host $host;
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "X-API-Key, Content-Type" always;
            add_header X-Cache-Status $upstream_cache_status always;
        }
    }
}
