worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Forward Proxy — acts on behalf of CLIENTS for outbound requests.
    #
    # In production, forward proxies use the CONNECT method (port 3128 is standard)
    # and require the ngx_http_proxy_connect_module.
    #
    # This demo uses path-based routing to simulate the same flow:
    #   Client → Forward Proxy → Target Server
    #
    # Real-world: corporate egress proxies (Netflix office networks), developer
    # proxies, content filtering, logging outbound traffic.

    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 3128;

        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "X-API-Key, Content-Type" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        add_header Via "nginx-forward-proxy-demo" always;

        # Route: GET /proxy/<host>/<path>
        # Example: /proxy/load-balancer/api/info → http://load-balancer/api/info
        location ~ ^/proxy/([^/]+)(/.*)$ {
            set $upstream_host $1;
            set $upstream_path $2;

            proxy_pass http://$upstream_host$upstream_path$is_args$args;
            proxy_set_header Host $upstream_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Via "nginx-forward-proxy";
        }

        # Production-style config (requires proxy_connect module):
        # proxy_connect;
        # proxy_connect_allow all;
        # proxy_pass $scheme://$http_host$request_uri;

        location = / {
            default_type application/json;
            return 200 '{"component":"forward-proxy","port":3128,"description":"Proxies outbound client requests","demo":"GET /proxy/load-balancer/api/info","production_note":"Uses CONNECT method with proxy_connect module"}';
        }

        location = /demo {
            default_type text/html;
            return 200 '<!DOCTYPE html><html><head><title>Forward Proxy</title>
<style>body{font-family:system-ui;max-width:640px;margin:40px auto;padding:0 20px;line-height:1.6}
code{background:#f0f0f0;padding:2px 8px;border-radius:4px}</style></head>
<body><h1>Forward Proxy (:3128)</h1>
<p>Acts on behalf of <strong>clients</strong> — outbound traffic flows through this proxy.</p>
<h2>Try it</h2>
<pre>curl http://localhost:3128/proxy/load-balancer/api/info</pre>
<p>Production forward proxies use <code>curl -x http://proxy:3128 http://target.com</code> with the CONNECT module.</p>
</body></html>';
        }
    }
}
